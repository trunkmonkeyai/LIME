name: LIME Daily Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # Каждый день в 09:00 МСК (06:00 UTC)
  workflow_dispatch:  # Ручной запуск

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
      
      - name: Run monitor
        run: python monitor.py
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: lime-report-${{ github.run_number }}
          path: |
            lime_report_*.html
            prev_data.json
          retention-days: 30
